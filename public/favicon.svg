<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Second Law Records globe icon">
  <defs>
    <clipPath id="globeClip">
      <circle cx="128" cy="128" r="108" />
    </clipPath>
  </defs>

  <g fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- interior lines, clipped inside the circle -->
    <g clip-path="url(#globeClip)">
      <!-- latitude lines, slightly closer to center -->
      <path d="M18 82 C70 58 186 58 238 82" />
      <path d="M8 112 C66 96 190 96 248 112" />
      <path d="M8 144 C66 160 190 160 248 144" />
      <path d="M18 174 C70 198 186 198 238 174" />

      <!-- longitude lines, slightly closer to center -->
      <path d="M82 18 C58 70 58 186 82 238" />
      <path d="M112 8 C96 66 96 190 112 248" />
      <path d="M144 8 C160 66 160 190 144 248" />
      <path d="M174 18 C198 70 198 186 174 238" />
    </g>

    <!-- outer circle drawn last so it obscures all interior line ends -->
    <circle cx="128" cy="128" r="108" />
  </g>
</svg>